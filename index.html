<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>2026北京版权课堂 · 知识产权科普</title>
    <!-- 引入 QRCode 轻量库（问答页面需要） -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(145deg, #F9F3E6 0%, #E8DFD0 100%);
            font-family: 'Inter', 'Segoe UI', 'Poppins', 'Noto Sans SC', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            position: relative;
        }

        /* 背景装饰 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 215, 150, 0.2) 2%, transparent 2.5%),
                              repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.05) 0px, rgba(212, 175, 55, 0.05) 2px, transparent 2px, transparent 8px);
            background-size: 40px 40px, 16px 16px;
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 */
        .app-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ========= 封面样式（精美红金渐变+故宫元素） ========= */
        .cover-page {
            background: linear-gradient(145deg, #FFF8F0 0%, #FFEFDB 100%);
            border-radius: 56px;
            border: 1px solid rgba(212, 175, 55, 0.8);
            box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255,245,215,0.8);
            overflow: hidden;
            text-align: center;
            padding: 48px 28px 56px;
            position: relative;
            transition: all 0.3s ease;
        }
        .cover-page::before {
            content: "🏮";
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 2.2rem;
            opacity: 0.35;
            font-family: monospace;
        }
        .cover-page::after {
            content: "⛩️";
            position: absolute;
            bottom: 24px;
            right: 24px;
            font-size: 2.2rem;
            opacity: 0.35;
        }
        .cover-icon {
            font-size: 5rem;
            filter: drop-shadow(0 12px 20px rgba(212, 175, 55, 0.5));
            margin-bottom: 20px;
            animation: floatCover 3s ease-in-out infinite;
        }
        @keyframes floatCover {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .cover-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #C0392B, #E67E22, #F1C40F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .cover-sub {
            font-size: 1rem;
            color: #B85C1A;
            background: rgba(243, 156, 18, 0.15);
            display: inline-block;
            padding: 6px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 0.5px solid #F7B05E;
            margin-bottom: 28px;
        }
        .cover-description {
            font-size: 0.95rem;
            color: #5D3A1A;
            max-width: 280px;
            margin: 0 auto 32px;
            line-height: 1.5;
            background: rgba(255,245,225,0.6);
            padding: 8px 16px;
            border-radius: 48px;
        }
        .enter-btn {
            background: linear-gradient(95deg, #E67E22, #F39C12, #F1C40F);
            border: none;
            padding: 14px 38px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 80px;
            color: #2C3E2F;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.4);
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .enter-btn:active { transform: scale(0.96); }
        .cover-footer {
            font-size: 0.7rem;
            color: #B87C4E;
            border-top: 1px solid #F7DC8D;
            padding-top: 20px;
            width: 80%;
            margin: 0 auto;
        }

        /* ========= 分页卡片样式 ========= */
        .card-page {
            background: rgba(255, 250, 240, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            border: 1px solid rgba(212, 175, 55, 0.7);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 28px 24px 32px;
            transition: all 0.2s ease;
        }
        .page-header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 2px solid #F7DC8D;
            padding-bottom: 16px;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #C0392B, #E67E22, #F1C40F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .page-header .page-number {
            font-size: 0.8rem;
            color: #B85C1A;
            margin-top: 6px;
            font-weight: 500;
        }
        .page-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: #B64926;
            border-left: 5px solid #F39C12;
            padding-left: 14px;
            margin-bottom: 20px;
        }
        .page-content {
            font-size: 0.92rem;
            line-height: 1.6;
            color: #3E2A1F;
            text-align: justify;
        }
        .page-content p {
            margin-bottom: 14px;
        }
        .stat-highlight {
            font-weight: 700;
            color: #C0392B;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 32px;
        }
        .nav-btn {
            flex: 1;
            background: #F7DC8D;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: #5D3A1A;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            background: linear-gradient(95deg, #F7DC8D, #F5D06A);
        }
        .nav-btn:active { transform: scale(0.96); }
        .nav-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* 游戏区域 */
        .game-wrapper {
            width: 100%;
            display: none;
        }
        .game-wrapper.active {
            display: block;
        }
        .ip-card {
            width: 100%;
            background: rgba(255, 250, 240, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            border: 1px solid rgba(212, 175, 55, 0.7);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .game-header {
            background: linear-gradient(120deg, #FFF3E0, #FFE9CF);
            padding: 20px 20px 14px;
            text-align: center;
            border-bottom: 2px solid #F7DC8D;
        }
        .game-header h2 {
            font-size: 1.7rem;
            font-weight: 800;
            color: #B64926;
        }
        .game-header p {
            color: #D35400;
            font-size: 0.8rem;
            margin-top: 6px;
        }
        .stats-modern {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            background: #FEF5E7;
            border-bottom: 1px solid #F7DC8D;
            flex-wrap: wrap;
            gap: 8px;
        }
        .score-module {
            background: #FFFFFF;
            border-radius: 48px;
            padding: 3px 16px;
            display: flex;
            align-items: baseline;
            gap: 6px;
            border: 1px solid #F39C12;
        }
        .score-module span:first-child { font-size: 0.8rem; font-weight: 600; color: #C0392B; }
        .score-module span:last-child { font-size: 1.5rem; font-weight: 800; color: #E67E22; }
        .q-progress {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 3px 14px;
            font-weight: 700;
            color: #D35400;
            font-size: 0.8rem;
            border: 1px solid #F7B05E;
        }
        .reset-corner-modern, .qr-share-btn {
            background: rgba(255, 230, 190, 0.9);
            border: 1px solid #F7B05E;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #C0392B;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .progress-bar-glow { background: #FDE6C4; height: 5px; width: 100%; }
        .progress-fill-glow {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #E67E22, #F1C40F);
            border-radius: 6px;
            transition: width 0.4s ease;
        }
        .quiz-core { padding: 20px 18px 26px; background: #FFFCF7; }
        .question-glow {
            background: #FFF5E8;
            border-radius: 40px;
            padding: 16px 18px;
            margin-bottom: 22px;
            border-left: 6px solid #F39C12;
        }
        .question-text { font-size: 1.25rem; font-weight: 700; color: #4A2A1A; line-height: 1.4; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
        .opt-item {
            background: #FFFFFF;
            border: 1px solid #F7DC8D;
            border-radius: 60px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }
        .opt-prefix-neon {
            width: 40px;
            height: 40px;
            background: #FDE6C4;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #D35400;
            flex-shrink: 0;
        }
        .opt-text { font-size: 0.92rem; font-weight: 500; color: #3E2A1F; flex: 1; }
        .opt-item.correct-highlight { background: #E0F2E9; border-color: #2E7D5E; }
        .opt-item.correct-highlight .opt-prefix-neon { background: #2E7D5E; color: white; }
        .opt-item.wrong-highlight { background: #FFE6E4; border-color: #E9635E; }
        .opt-item.wrong-highlight .opt-prefix-neon { background: #C23B22; color: white; }
        .disabled-opt { pointer-events: none; opacity: 0.9; }
        .feedback-card {
            background: #FFF3E6;
            border-radius: 28px;
            padding: 12px 18px;
            margin: 14px 0 18px;
            border-left: 5px solid;
            font-size: 0.85rem;
        }
        .feedback-correct { border-left-color: #2E7D5E; background: #E9F6EF; color: #1B5E3F; }
        .feedback-wrong { border-left-color: #E9635E; background: #FFEFED; color: #B13B2E; }
        .next-btn-glow {
            width: 100%;
            background: linear-gradient(95deg, #E67E22, #F1C40F);
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 60px;
            color: #2D2B1F;
            cursor: pointer;
            display: none;
        }
        .next-btn-glow.show { display: block; }
        .result-space {
            background: #FFFCF7;
            padding: 28px 18px;
            text-align: center;
            border-radius: 44px;
            margin: 12px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            border: 1px solid #F7B05E;
        }
        .result-space h2 { font-size: 1.7rem; color: #C0392B; }
        .final-score-big {
            font-size: 2.8rem;
            font-weight: 800;
            background: #FEF0DF;
            padding: 6px 24px;
            border-radius: 80px;
            color: #E67E22;
            border: 1px solid #F39C12;
        }
        .restart-neon {
            background: #F39C12;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #2C2B1F;
            cursor: pointer;
        }
        .footer-note {
            text-align: center;
            font-size: 0.65rem;
            padding: 12px;
            color: #A66B38;
            background: #FEF5E7;
            border-top: 1px solid #F7DC8D;
        }
        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .qr-modal.active { visibility: visible; opacity: 1; }
        .qr-card {
            background: #FFFBF0;
            border-radius: 40px;
            padding: 20px 18px;
            width: 270px;
            text-align: center;
            border: 2px solid #F39C12;
        }
        .qr-card h3 { color: #C0392B; margin-bottom: 12px; }
        #qrcode-container { background: white; padding: 10px; border-radius: 24px; display: inline-block; margin: 6px 0; }
        .qr-close { background: #F39C12; border: none; padding: 6px 20px; border-radius: 40px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>

        { title: "二、版权强国建设典型案例——数智赋能检察履职服务版权高质量发展", content: `

    ];

    let currentPage = 0;
    let pagesContainer = document.getElementById('pagesContainer');
    let gameWrapper = document.getElementById('gameWrapper');
    let coverPage = document.getElementById('coverPage');
    let enterBtn = document.getElementById('enterBtn');

    // 渲染分页视图，并动态绑定按钮事件（确保每次重新渲染后事件正确）
    function renderPages() {
        pagesContainer.innerHTML = '';
        pagesData.forEach((page, idx) => {
            const card = document.createElement('div');
            card.className = 'card-page';
            card.style.display = idx === currentPage ? 'block' : 'none';
            card.innerHTML = `
                <div class="page-header">
                    <h1>2026北京版权课堂</h1>
                    <div class="page-number">第 ${idx+1} / ${pagesData.length} 页</div>
                </div>
                <div class="page-title">${page.title}</div>
                <div class="page-content">${page.content}</div>
                <div class="nav-buttons">
                    <button class="nav-btn prev-btn" data-idx="${idx}">◀ 上一页</button>
                    ${idx === pagesData.length-1 ? '<button class="nav-btn start-final-btn" data-idx="final">✨ 开始挑战 ✨</button>' : '<button class="nav-btn next-btn" data-idx="${idx}">下一页 ▶</button>'}
                </div>
            `;
            pagesContainer.appendChild(card);
        });

        // 使用事件委托绑定所有导航按钮（避免重复绑定）
        pagesContainer.querySelectorAll('.prev-btn').forEach(btn => {
            btn.removeEventListener('click', handlePrev);
            btn.addEventListener('click', handlePrev);
        });
        pagesContainer.querySelectorAll('.next-btn').forEach(btn => {
            btn.removeEventListener('click', handleNext);
            btn.addEventListener('click', handleNext);
        });
        pagesContainer.querySelectorAll('.start-final-btn').forEach(btn => {
            btn.removeEventListener('click', handleStart);
            btn.addEventListener('click', handleStart);
        });
    }

    function handlePrev(e) {
        if (currentPage > 0) {
            currentPage--;
            updatePageVisibility();
        }
    }
    function handleNext(e) {
        if (currentPage < pagesData.length - 1) {
            currentPage++;
            updatePageVisibility();
        }
    }
    function handleStart() {
        startGame();
    }

    function updatePageVisibility() {
        const cards = document.querySelectorAll('.card-page');
        cards.forEach((card, idx) => {
            card.style.display = idx === currentPage ? 'block' : 'none';
        });
    }

    // 进入课堂：隐藏封面，显示分页内容
    function showPages() {
        coverPage.style.display = 'none';
        pagesContainer.style.display = 'block';
        currentPage = 0;
        renderPages();      // 初次渲染并绑定事件
        updatePageVisibility();
    }

    // 开始挑战：隐藏分页容器，显示游戏并重置状态
    function startGame() {
        pagesContainer.style.display = 'none';
        gameWrapper.classList.add('active');
        resetGameState();
    }

    // ---------- 问答游戏逻辑（10题趣味题库）----------
    const QUESTIONS_IP = [
        { text: "根据我国《著作权法》，著作权自什么时候产生？", options: ["作品发表后", "作品登记后", "作品创作完成之时", "作品出版后"], correct: 2, explanation: "✅ 依据“自动保护原则”——作品一经创作完成，即自动产生著作权，无须履行登记注册手续。" },
        { text: "以下哪一项不属于《著作权法》保护的对象？", options: ["小说《三体》", "电影《流浪地球》", "“今天是晴天”这一单纯事实消息", "计算机软件"], correct: 2, explanation: "📘 不受保护的对象包括思想、事实、官方文件、单纯新闻消息等。" },
        { text: "著作权中的哪几项权利是永久保护的？", options: ["复制权、发行权", "署名权、修改权、保护作品完整权", "信息网络传播权", "出租权、展览权"], correct: 1, explanation: "📘 著作人身权（署名权、修改权、保护作品完整权）永久保护，发表权与财产权有期限。" },
        { text: "自然人的作品，财产权保护期是多久？", options: ["作者终生", "作者终生加10年", "作者终生加50年", "作者终生加70年"], correct: 2, explanation: "📘 作者有生之年加死后50年，截止于作者死亡后第50年的12月31日。" },
        { text: "2021年修订的《著作权法》将法定赔偿额上限提高到多少？", options: ["50万元", "100万元", "500万元", "1000万元"], correct: 2, explanation: "📘 法定赔偿额上限从50万元提高到500万元，并设500元下限，解决长期诟病的“侵权赔偿低”问题。" },
        { text: "对故意侵权、情节严重的，新《著作权法》引入了什么制度？", options: ["行政拘留", "惩罚性赔偿（1-5倍）", "终身禁业", "公开道歉"], correct: 1, explanation: "📘 可判决给予实际损失等一倍以上五倍以下的赔偿，对侵权盗版产生强大震慑。" },
        { text: "“避风港”原则的核心规则是什么？", options: ["平台永久免责", "通知—删除", "权利人自行取证", "平台主动审查所有内容"], correct: 1, explanation: "📘 平台收到权利人合格通知后，必须立即删除或屏蔽侵权内容，即可进入“避风港”免责。" },
        { text: "2021年修订的《著作权法》将“电影作品和以类似摄制电影的方法创作的作品”修改为什么？", options: ["短视频作品", "视听作品", "动态影像作品", "多媒体作品"], correct: 1, explanation: "📘 引入“视听作品”概念，涵盖短视频、网络游戏直播、音乐喷泉等新型作品，回应产业发展需求。" },
        { text: "小明在电影院用手机偷拍正在热映的电影，并上传到自己的短视频账号。这种行为属于？", options: ["合理使用，因为他是自己看", "法定许可，可以事后付钱", "侵犯著作权，未经许可传播影视作品是侵权行为", "没问题，电影院没有禁止拍摄"], correct: 2, explanation: "🎬 未经许可将热映电影上传网络，侵犯了著作权人的信息网络传播权。即使是“枪版”，也属于盗版行为，可能面临民事赔偿甚至刑事责任。" },
        { text: "小李买了一本正版小说，以下哪件事是他不能做的？", options: ["看完后借给朋友", "在朋友圈拍照分享书中的金句并注明出处", "把整本书扫描成PDF上传到网盘供所有人免费下载", "在二手平台卖掉这本书"], correct: 2, explanation: "📚 将整本书扫描上传供公众免费下载，侵犯了复制权和信息网络传播权。而借给朋友、二手转卖（权利耗尽原则）、合理引用分享金句，都是合法行为。" }
    ];
    const TOTAL = QUESTIONS_IP.length;
    const SCORE_VAL = 10;
    let curIdx = 0, totalScore = 0, hasAnswered = false;

    const quizContainer = document.getElementById('quizAreaNew');
    const resultContainer = document.getElementById('resultPanelNew');
    const questionEl = document.getElementById('questionTextNew');
    const optionsWrap = document.getElementById('optionsContainerNew');
    const feedbackDiv = document.getElementById('feedbackAreaNew');
    const nextBtn = document.getElementById('nextButtonNew');
    const scoreSpan = document.getElementById('scoreValueNew');
    const qCounterSpan = document.getElementById('qCounterNew');
    const progressFill = document.getElementById('progressFillNew');
    const finalScoreSpan = document.getElementById('finalScoreSpanNew');
    const commentMsgSpan = document.getElementById('commentMsgNew');
    const restartResultBtn = document.getElementById('restartFromResultNew');
    const customResetBtn = document.getElementById('customResetBtnNew');
    const qrShareBtn = document.getElementById('qrShareBtn');
    const qrModal = document.getElementById('qrModal');
    const closeQrModal = document.getElementById('closeQrModal');
    const qrcodeContainer = document.getElementById('qrcode-container');

    function updateUI() {
        scoreSpan.innerText = totalScore;
        qCounterSpan.innerText = `第${curIdx+1} / ${TOTAL}关`;
        const percent = (curIdx / TOTAL) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function resetGameState() {
        curIdx = 0; totalScore = 0; hasAnswered = false;
        updateUI();
        resultContainer.style.display = 'none';
        quizContainer.style.display = 'block';
        nextBtn.classList.remove('show');
        renderCurrentQuestion();
        feedbackDiv.innerHTML = '';
        feedbackDiv.className = 'feedback-card';
    }

    function showResult() {
        quizContainer.style.display = 'none';
        resultContainer.style.display = 'flex';
        const maxScore = TOTAL * SCORE_VAL;
        finalScoreSpan.innerText = `${totalScore} / ${maxScore}`;
        let comment = "";
        if (totalScore === maxScore) comment = "🎖️ 京城知产守护者！满分荣耀 🎖️";
        else if (totalScore >= maxScore * 0.7) comment = "🌟 优秀！传承创新之都风范！";
        else if (totalScore >= maxScore * 0.4) comment = "📘 学无止境，了解知产保护创新成果";
        else comment = "🚀 再试一次，用知识产权守护北京智慧！";
        commentMsgSpan.innerText = comment;
    }

    function handleAnswer(optIndex, allOpts) {
        if (hasAnswered) return;
        const q = QUESTIONS_IP[curIdx];
        const isCorrect = (optIndex === q.correct);
        if (isCorrect) { totalScore += SCORE_VAL; updateUI(); }
        hasAnswered = true;
        allOpts.forEach((btn, idx) => {
            btn.classList.add('disabled-opt');
            if (idx === q.correct) btn.classList.add('correct-highlight');
            if (idx === optIndex && !isCorrect) btn.classList.add('wrong-highlight');
            if (idx === optIndex && isCorrect) btn.classList.add('correct-highlight');
        });
        const correctLetter = String.fromCharCode(65 + q.correct);
        const correctAnsText = q.options[q.correct];
        let feedbackHtml = "";
        if (isCorrect) {
            feedbackHtml = `✔️ 正确！ ${q.explanation}`;
        } else {
            feedbackHtml = `❌ 回答错误！ 正确答案是 ${correctLetter}. ${correctAnsText}<br>📖 ${q.explanation}`;
        }
        feedbackDiv.innerHTML = feedbackHtml;
        feedbackDiv.className = `feedback-card ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}`;
        nextBtn.innerText = (curIdx === TOTAL-1) ? "🏁 查看知产星图" : "下一题 ➡️";
        nextBtn.classList.add('show');
    }

    function renderCurrentQuestion() {
        const q = QUESTIONS_IP[curIdx];
        questionEl.innerText = q.text;
        optionsWrap.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const prefix = String.fromCharCode(65+idx);
            const div = document.createElement('div');
            div.className = 'opt-item';
            div.innerHTML = `<div class="opt-prefix-neon">${prefix}</div><div class="opt-text">${opt}</div>`;
            div.addEventListener('click', () => {
                if (hasAnswered) return;
                const btns = document.querySelectorAll('.opt-item');
                handleAnswer(idx, btns);
            });
            optionsWrap.appendChild(div);
        });
        hasAnswered = false;
        nextBtn.classList.remove('show');
        feedbackDiv.innerHTML = '';
        feedbackDiv.className = 'feedback-card';
        updateUI();
    }

    function nextStep() {
        if (!hasAnswered) {
            feedbackDiv.innerHTML = "✨ 请选择答案，点亮创新星火 ✨";
            feedbackDiv.className = "feedback-card";
            setTimeout(() => { if (!hasAnswered && feedbackDiv.innerHTML.includes("点亮")) feedbackDiv.innerHTML = ''; }, 1300);
            return;
        }
        if (curIdx === TOTAL-1) showResult();
        else { curIdx++; hasAnswered = false; renderCurrentQuestion(); }
    }

    function generateQR() {
        qrcodeContainer.innerHTML = "";
        let url = window.location.href;
        if (!url || url === "about:blank") url = "部署后扫码访问";
        try {
            new QRCode(qrcodeContainer, { text: url, width: 150, height: 150, colorDark: "#4A2A1A", colorLight: "#FFFBF0" });
        } catch(e) { qrcodeContainer.innerHTML = "<div style='padding:8px;'>生成失败</div>"; }
        if (window.location.protocol === 'file:') qrcodeContainer.innerHTML += "<div style='font-size:10px;margin-top:6px;'>部署服务器后生效</div>";
    }
    function openQr() { generateQR(); qrModal.classList.add('active'); }
    function closeQr() { qrModal.classList.remove('active'); qrcodeContainer.innerHTML = ''; }

    // 绑定游戏事件
    nextBtn.addEventListener('click', nextStep);
    restartResultBtn.addEventListener('click', () => { resetGameState(); });
    customResetBtn.addEventListener('click', () => { resetGameState(); });
    qrShareBtn.addEventListener('click', openQr);
    closeQrModal.addEventListener('click', closeQr);
    qrModal.addEventListener('click', (e) => { if (e.target === qrModal) closeQr(); });

    // 进入课堂按钮
    enterBtn.addEventListener('click', showPages);

    // 预渲染游戏第一题（但游戏未显示）
    renderCurrentQuestion();
    updateUI();
    resultContainer.style.display = 'none';
    quizContainer.style.display = 'block';
    nextBtn.classList.remove('show');
    feedbackDiv.innerHTML = '';
</script>
</body>
</html>
